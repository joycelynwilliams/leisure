<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interval Timer</title>
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #0f172a;
  color: white;
}

.timer-container {
  text-align: center;
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.label {
  font-size: 24px;
}

.time {
  font-size: 60px;
  margin: 20px 0;
}

button {
  margin: 5px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.start { background: #22c55e; }
.pause { background: #f59e0b; }
.reset { background: #ef4444; }
</style>
</head>

<body>

<div class="timer-container">
  <div class="label" id="label">WORK</div>
  <div class="time" id="time">03:00</div>

  <button class="start" onclick="startTimer()">Start</button>
  <button class="pause" onclick="pauseTimer()">Pause</button>
  <button class="reset" onclick="resetTimer()">Reset</button>
</div>

<script>
let workTime = 180;
let restTime = 120;
let currentTime = workTime;
let isWork = true;
let timer = null;

function updateDisplay() {
  let minutes = Math.floor(currentTime / 60);
  let seconds = currentTime % 60;
  document.getElementById("time").textContent =
    String(minutes).padStart(2, '0') + ":" +
    String(seconds).padStart(2, '0');
  document.getElementById("label").textContent = isWork ? "WORK" : "REST";
}

function startTimer() {
  if (timer) return;
  timer = setInterval(() => {
    currentTime--;
    if (currentTime < 0) {
      isWork = !isWork;
      currentTime = isWork ? workTime : restTime;
    }
    updateDisplay();
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  timer = null;
}

function resetTimer() {
  pauseTimer();
  isWork = true;
  currentTime = workTime;
  updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
